<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Estilos Generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #faf8f5;
        }

        header {
            background-color: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            color: #d4af37; /* Color dorado */
            letter-spacing: 2px;
        }

        /* Hero Section */
        .hero {
            background-color: #f3ebe1;
            padding: 60px 20px;
            text-align: center;
        }

        .hero h2 {
            font-size: 36px;
            margin-bottom: 10px;
            color: #4a4a4a;
        }

        .hero p {
            font-size: 18px;
            color: #777;
            margin-bottom: 25px;
        }

        .btn-cta {
            background-color: #d4af37;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background 0.3s;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn-cta:hover {
            background-color: #b8952e;
        }

        /* Sección de Productos */
        .productos {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .tarjeta-producto {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .placeholder-imagen {
            background-color: #e0e0e0;
            height: 200px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            border-radius: 4px;
        }

        .tarjeta-producto h3 {
            margin: 10px 0 5px 0;
            font-size: 20px;
        }

        .precio {
            color: #d4af37;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* Sección de Contacto (Formulario) */
        .contacto {
            background-color: #fff;
            padding: 50px 20px;
            max-width: 600px;
            margin: 40px auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }

        .contacto h2 {
            color: #4a4a4a;
            margin-bottom: 10px;
        }

        .contacto p {
            color: #777;
            margin-bottom: 25px;
            font-size: 15px;
        }

        .contacto form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .contacto label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
